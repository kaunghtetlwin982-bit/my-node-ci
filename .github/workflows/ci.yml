name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ပထမ Job: Code စစ်ဆေးပြီး Test Run တဲ့အပိုင်း
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sms_new
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate
        
      - name: Check Formatting
        run: npm run format:check

      - name: Run Lint
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

      - name: Prisma Generate & Migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npx prisma generate
          npx prisma db push

      - name: Run Tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
        run: NODE_OPTIONS=--experimental-vm-modules npm test

  # ဒုတိယ Job: Test အောင်ရင် Server ပေါ်တင်မယ့်အပိုင်း (CD)
  deploy:
    needs: build-and-test # build-and-test အောင်မှ လုပ်မယ်
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # ၁။ Project folder ထဲကို အရင်ဝင်မယ်
            cd ${{ secrets.SERVER_DEST }}
            
            # ၂။ GitHub ကနေ နောက်ဆုံး code တွေကို ဆွဲယူမယ်
            git pull origin main
            
            # ၃။ လိုအပ်တာတွေ သွင်းပြီး Build ဆွဲမယ်
            npm install --legacy-peer-deps
            npx prisma generate
            npm run build
            
            # ၄။ PM2 နဲ့ App ကို Restart ချမယ်
            pm2 restart my-node-ci || pm2 start dist/app.js --name "my-node-ci"